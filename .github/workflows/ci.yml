name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed secrets
        shell: pwsh
        run: ./scripts/check-secrets.ps1

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: secret-scan
    env:
      APP_ENV: test
      JWT_SECRET_KEY: ci-test-jwt-secret-key-at-least-32-bytes
      DEEPSEEK_API_KEY: sk-test
      EMBEDDING_ALLOW_DOWNLOAD: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint backend
        run: |
          python -m pip install ruff
          python -m ruff check backend

      - name: Run backend tests
        run: python -m pytest backend/tests -q

      - name: Audit backend dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r backend/requirements.txt --strict

      - name: Verify Alembic migrations
        env:
          DATABASE_URL: sqlite:///./alembic_ci.db
        run: python -m alembic upgrade head

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Build frontend
        run: npm --prefix frontend run build

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t pinai-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t pinai-frontend:ci frontend

      - name: Build WeCom sidecar image
        run: docker build -f integrations/wecom-long-connection/Dockerfile -t pinai-wecom-long-connection:ci integrations/wecom-long-connection
