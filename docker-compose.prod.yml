name: ${COMPOSE_PROJECT_NAME:-pinai}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    cpus: ${POSTGRES_CPUS:-1.0}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    cpus: ${REDIS_CPUS:-0.5}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    mem_limit: ${BACKEND_MEM_LIMIT:-3g}
    cpus: ${BACKEND_CPUS:-2.0}
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CHROMA_PERSIST_DIR: /app/chroma_data
      EMBEDDING_CACHE_DIR: /app/models/fastembed
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-["172.28.0.20","172.28.0.10","127.0.0.1"]}
    volumes:
      - chroma_data:/app/chroma_data
      - embedding_models:/app/models/fastembed
      - uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=172.28.0.20,172.28.0.10,127.0.0.1
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "7"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/}
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-256m}
    cpus: ${FRONTEND_CPUS:-0.5}
    expose:
      - "8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
        ipv4_address: 172.28.0.20
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    cpus: ${CADDY_CPUS:-0.5}
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL:-admin@example.com}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
    networks:
      default:
        ipv4_address: 172.28.0.10
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  wecom-long-connection:
    build:
      context: ./integrations/wecom-long-connection
    restart: unless-stopped
    mem_limit: ${WECOM_MEM_LIMIT:-256m}
    cpus: ${WECOM_CPUS:-0.5}
    profiles: ["wecom"]
    env_file:
      - .env.production
    environment:
      PINAI_API_BASE: http://backend:8000
      WECOM_HEALTH_PORT: 8787
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.WECOM_HEALTH_PORT || 8787)).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  embedding_models:
  uploads:
  caddy_data:
  caddy_config:

networks:
  default:
    name: pinai-net
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
